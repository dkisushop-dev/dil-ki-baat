<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dil Ki Baat</title>
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="main-container"> 
    <div class="counter-box">
      ✨ <span id="burden-count">1,424</span> bojh hawa me guum kiye gaye
    </div>

    <h1>Dil Ki Baat</h1>
    <p>Aap yahan safe hain. Jo bhi mann me hai, use yahan likh kar ya bol kar apna bojh halka kijiye...</p>
    
    <textarea id="confession-text" placeholder="Apne dil ki baat yahan likhiye..."></textarea>
    
    <div class="btn-group">
      <button id="mic-btn" class="mic-btn">Boliye (Mic) 🎙️</button>
      <button id="music-btn" class="music-btn">Soothing Music 🎵</button>
    </div>
    
    <br>
    <button class="release-btn">Let it Go ✨</button>
  </div>

  <audio id="bg-music" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
  </audio>

  <script src="script.js"></script>
</body>
</html>
